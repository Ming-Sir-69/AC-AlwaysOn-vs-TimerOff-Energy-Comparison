<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>空调能耗对比交互仪表盘</title>
<script src="https://cdn.plot.ly/plotly-2.30.0.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: system-ui, -apple-system, "Microsoft YaHei", sans-serif;
    background: #0b1220;
    color: #e5e7eb;
    min-height: 100vh;
  }
  /* ── 顶部标题栏 ── */
  .header {
    background: linear-gradient(135deg, #0f1b33 0%, #162544 100%);
    border-bottom: 2px solid #f59e0b;
    padding: 18px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .header h1 {
    font-size: 1.6rem;
    font-weight: 700;
    color: #f59e0b;
    letter-spacing: 1px;
  }
  .header .subtitle {
    font-size: 0.85rem;
    color: #9ca3af;
  }
  /* ── 主布局 ── */
  .main-layout {
    display: flex;
    min-height: calc(100vh - 70px);
  }
  /* ── 左侧面板 ── */
  .sidebar {
    width: 260px;
    min-width: 260px;
    background: #0f1b33;
    border-right: 1px solid #1e3a5f;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }
  .sidebar h3 {
    font-size: 0.95rem;
    color: #f59e0b;
    border-bottom: 1px solid #1e3a5f;
    padding-bottom: 8px;
  }
  .control-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .control-group label {
    font-size: 0.8rem;
    color: #9ca3af;
  }
  .control-group select {
    background: #162544;
    color: #e5e7eb;
    border: 1px solid #1e3a5f;
    border-radius: 6px;
    padding: 8px 10px;
    font-size: 0.85rem;
    cursor: pointer;
    outline: none;
    transition: border-color 0.2s;
  }
  .control-group select:focus {
    border-color: #f59e0b;
  }
  /* ── 右侧内容 ── */
  .content {
    flex: 1;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    overflow-y: auto;
  }
  /* ── 图表网格 ── */
  .chart-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  .chart-card {
    background: #0f1b33;
    border: 1px solid #1e3a5f;
    border-radius: 10px;
    padding: 14px;
    position: relative;
  }
  .chart-card h4 {
    font-size: 0.9rem;
    color: #f59e0b;
    margin-bottom: 10px;
    padding-left: 10px;
    border-left: 3px solid #f59e0b;
  }
  .chart-card .plotly-chart {
    width: 100%;
    height: 340px;
  }
  /* ── KPI 卡片 ── */
  .kpi-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
  }
  .kpi-card {
    background: #0f1b33;
    border: 1px solid #1e3a5f;
    border-radius: 10px;
    padding: 16px;
    text-align: center;
    transition: border-color 0.3s, transform 0.2s;
  }
  .kpi-card:hover {
    border-color: #f59e0b;
    transform: translateY(-2px);
  }
  .kpi-card .kpi-label {
    font-size: 0.75rem;
    color: #9ca3af;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .kpi-card .kpi-value {
    font-size: 1.5rem;
    font-weight: 700;
    color: #f59e0b;
  }
  .kpi-card .kpi-detail {
    font-size: 0.72rem;
    color: #6b7280;
    margin-top: 6px;
    line-height: 1.4;
  }
  .kpi-card.green .kpi-value { color: #66bb6a; }
  .kpi-card.red .kpi-value { color: #ef5350; }
  .kpi-card.blue .kpi-value { color: #42A5F5; }
  /* ── 响应式 ── */
  @media (max-width: 1100px) {
    .chart-grid { grid-template-columns: 1fr; }
    .kpi-row { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 768px) {
    .main-layout { flex-direction: column; }
    .sidebar { width: 100%; min-width: unset; flex-direction: row; flex-wrap: wrap; }
    .kpi-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- 顶部标题栏 -->
<div class="header">
  <div>
    <h1>空调能耗对比交互仪表盘</h1>
    <div class="subtitle">方案A（恒温持续运行） vs 方案B（间歇关机重启） — 基于L50正交实验与二分法临界点搜索</div>
  </div>
</div>

<!-- 主布局 -->
<div class="main-layout">
  <!-- 左侧控制面板 -->
  <div class="sidebar">
    <h3>筛选与控制</h3>

    <div class="control-group">
      <label>图表1 — 室外温度筛选</label>
      <select id="filterTout">
        <option value="all">全部温度</option>
      </select>
    </div>

    <div class="control-group">
      <label>图表3 — 敏感性因子</label>
      <select id="sensitivityFactor">
        <option value="t_off">外出时长 (h)</option>
        <option value="T_out">室外温度 (°C)</option>
        <option value="T_set">设定温度 (°C)</option>
        <option value="tau">热时间常数 (h)</option>
        <option value="COP">能效比 COP</option>
      </select>
    </div>

    <div class="control-group">
      <label>图表4 — 方差分析类型</label>
      <select id="anovaType">
        <option value="bar">柱状图</option>
        <option value="pie">饼图</option>
      </select>
    </div>

    <div style="margin-top: auto; padding-top: 16px; border-top: 1px solid #1e3a5f;">
      <div style="font-size:0.72rem; color:#6b7280; line-height:1.5;">
        <strong style="color:#9ca3af;">数据说明</strong><br>
        L50增强正交实验（50组工况）<br>
        二分法临界点搜索（600组）<br>
        悬浮图表可查看详细数值
      </div>
    </div>
  </div>

  <!-- 右侧内容 -->
  <div class="content">
    <!-- 图表网格 -->
    <div class="chart-grid">
      <!-- 图表1: 两方案耗电量对比散点图 -->
      <div class="chart-card">
        <h4>两方案耗电量对比散点图</h4>
        <div id="chart1" class="plotly-chart"></div>
      </div>

      <!-- 图表2: 临界时长热力图 -->
      <div class="chart-card">
        <h4>临界外出时长热力图</h4>
        <div id="chart2" class="plotly-chart"></div>
      </div>

      <!-- 图表3: 单因子敏感性曲线 -->
      <div class="chart-card">
        <h4>单因子敏感性分析</h4>
        <div id="chart3" class="plotly-chart"></div>
      </div>

      <!-- 图表4: 方差贡献率 -->
      <div class="chart-card">
        <h4>各因子方差贡献率 (ANOVA)</h4>
        <div id="chart4" class="plotly-chart"></div>
      </div>
    </div>

    <!-- KPI 卡片 -->
    <div class="kpi-row">
      <div class="kpi-card green">
        <div class="kpi-label">平均临界外出时长</div>
        <div class="kpi-value" id="kpi1">--</div>
        <div class="kpi-detail">超过此时长关机更省电</div>
      </div>
      <div class="kpi-card blue">
        <div class="kpi-label">最大节能比例</div>
        <div class="kpi-value" id="kpi2">--</div>
        <div class="kpi-detail">方案B相对方案A</div>
      </div>
      <div class="kpi-card green">
        <div class="kpi-label">最有利工况（关机最省）</div>
        <div class="kpi-value" id="kpi3" style="font-size:0.9rem;">--</div>
        <div class="kpi-detail" id="kpi3detail"></div>
      </div>
      <div class="kpi-card red">
        <div class="kpi-label">最不利工况（关机反而费电）</div>
        <div class="kpi-value" id="kpi4" style="font-size:0.9rem;">--</div>
        <div class="kpi-detail" id="kpi4detail"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ── 嵌入数据 ─────────────────────────────────────────────
const DATA = {"scatter": {"t_off": [2, 2, 2, 2, 2, 5, 5, 5, 5, 5, 8, 8, 8, 8, 8, 11, 11, 11, 11, 11, 14, 14, 14, 14, 14, 2, 2, 2, 2, 2, 5, 5, 5, 5, 5, 8, 8, 8, 8, 8, 11, 11, 11, 11, 11, 14, 14, 14, 14, 14], "T_out": [26, 30, 34, 38, 40, 26, 30, 34, 38, 40, 26, 30, 34, 38, 40, 26, 30, 34, 38, 40, 26, 30, 34, 38, 40, 26, 30, 34, 38, 40, 26, 30, 34, 38, 40, 26, 30, 34, 38, 40, 26, 30, 34, 38, 40, 26, 30, 34, 38, 40], "E_A": [3.6923, 5.6, 7.2727, 8.6667, 8.4, 1.2, 4.6154, 6.4, 11.6364, 11.3333, 0.0, 4.8, 10.1538, 11.2, 10.9091, 2.1818, 4.0, 5.4, 11.0769, 14.4, 0.8, 2.9091, 8.0, 9.0, 14.7692, 3.6923, 5.6, 7.2727, 8.6667, 8.4, 1.2, 4.6154, 6.4, 11.6364, 11.3333, 0.0, 4.8, 10.1538, 11.2, 10.9091, 2.1818, 4.0, 5.4, 11.0769, 14.4, 0.8, 2.9091, 8.0, 9.0, 14.7692], "E_B": [3.5897, 5.5938, 7.3577, 8.91, 8.807, 1.3361, 4.7866, 5.404, 10.3198, 10.1851, 0.0501, 3.9736, 8.9282, 9.5571, 7.8692, 2.5452, 2.3889, 3.4909, 7.5756, 10.693, 0.5184, 1.7859, 5.5156, 4.2497, 7.7608, 3.5897, 5.5938, 7.3577, 8.91, 8.807, 1.3361, 4.7866, 5.404, 10.3198, 10.1851, 0.0501, 3.9736, 8.9282, 9.5571, 7.8692, 2.5452, 2.3889, 3.4909, 7.5756, 10.693, 0.5184, 1.7859, 5.5156, 4.2497, 7.7608], "savings_pct": [2.78, 0.11, -1.17, -2.81, -4.85, -11.34, -3.71, 15.56, 11.31, 10.13, 0.0, 17.22, 12.07, 14.67, 27.87, -16.65, 40.28, 35.35, 31.61, 25.74, 35.2, 38.61, 31.06, 52.78, 47.45, 2.78, 0.11, -1.17, -2.81, -4.85, -11.34, -3.71, 15.56, 11.31, 10.13, 0.0, 17.22, 12.07, 14.67, 27.87, -16.65, 40.28, 35.35, 31.61, 25.74, 35.2, 38.61, 31.06, 52.78, 47.45], "winner": ["B关机更省", "B关机更省", "A常开更省", "A常开更省", "A常开更省", "A常开更省", "A常开更省", "B关机更省", "B关机更省", "B关机更省", "A常开更省", "B关机更省", "B关机更省", "B关机更省", "B关机更省", "A常开更省", "B关机更省", "B关机更省", "B关机更省", "B关机更省", "B关机更省", "B关机更省", "B关机更省", "B关机更省", "B关机更省", "B关机更省", "B关机更省", "A常开更省", "A常开更省", "A常开更省", "A常开更省", "A常开更省", "B关机更省", "B关机更省", "B关机更省", "A常开更省", "B关机更省", "B关机更省", "B关机更省", "B关机更省", "A常开更省", "B关机更省", "B关机更省", "B关机更省", "B关机更省", "B关机更省", "B关机更省", "B关机更省", "B关机更省", "B关机更省"], "T_out_unique": [26, 30, 34, 38, 40]}, "heatmap": {"T_out_vals": [26.0, 28.0, 30.0, 32.0, 34.0, 36.0, 38.0, 40.0], "tau_vals": [2.0, 4.0, 6.0, 9.0, 12.0], "t_critical_matrix": [[0.9081, 1.0715, 1.1474, 1.1882, 1.2116, 1.2291, 1.2466, 1.2524], [1.8184, 2.1452, 2.291, 2.3727, 2.4252, 2.4602, 2.4894, 2.5069], [2.7286, 3.2188, 3.4347, 3.5572, 3.6389, 3.6914, 3.7323, 3.7614], [4.0999, 4.8292, 5.156, 5.3369, 5.4536, 5.5353, 5.5995, 5.6461], [5.4652, 6.4397, 6.8715, 7.1165, 7.2741, 7.3849, 7.4608, 7.525]]}, "sensitivity": {"t_off": {"label": "外出时长 (h)", "levels": [2.0, 5.0, 8.0, 11.0, 14.0], "savings_mean": [-1.19, 4.39, 14.37, 23.27, 41.02], "savings_std": [2.73, 10.74, 9.45, 21.63, 8.41], "E_A_mean": [6.7263, 7.037, 7.4126, 7.4117, 7.0957], "E_B_mean": [6.8516, 6.4063, 6.0756, 5.3387, 3.9661]}, "T_out": {"label": "室外温度 (°C)", "levels": [26.0, 30.0, 34.0, 38.0, 40.0], "savings_mean": [2.0, 18.5, 18.57, 21.51, 21.27], "savings_std": [19.05, 19.5, 13.97, 20.12, 18.59], "E_A_mean": [1.5748, 4.3849, 7.4453, 10.316, 11.9623], "E_B_mean": [1.6079, 3.7058, 6.1393, 8.1224, 9.063]}, "T_set": {"label": "设定温度 (°C)", "levels": [22.0, 23.0, 24.0, 25.0, 26.0], "savings_mean": [17.62, 11.69, 17.98, 18.38, 16.19], "savings_std": [10.61, 24.17, 24.05, 18.84, 17.92], "E_A_mean": [8.5057, 7.6538, 7.6884, 6.0782, 5.7572], "E_B_mean": [6.8183, 6.3004, 5.6801, 5.115, 4.7245]}, "tau": {"label": "热时间常数 (h)", "levels": [2.0, 4.0, 6.0, 9.0, 12.0], "savings_mean": [27.85, 18.84, 18.6, 12.45, 4.1], "savings_std": [18.59, 20.3, 14.22, 19.21, 17.7], "E_A_mean": [6.8003, 7.4811, 7.0566, 7.4659, 6.8794], "E_B_mean": [4.7003, 5.4431, 5.9221, 6.3306, 6.2423]}, "COP": {"label": "能效比 COP", "levels": [2.6, 3.0, 3.3, 3.6, 4.0], "savings_mean": [18.04, 18.26, 11.99, 15.73, 17.83], "savings_std": [19.95, 12.41, 20.84, 18.01, 25.36], "E_A_mean": [8.8615, 7.68, 6.9818, 6.4, 5.76], "E_B_mean": [6.5282, 6.3533, 5.9756, 5.4099, 4.3715]}}, "anova": [{"factor": "外出时长", "contribution": 3.2549, "pct": 29.6}, {"factor": "室外温度", "contribution": 2.9324, "pct": 26.6}, {"factor": "初始室温", "contribution": 0.9736, "pct": 8.8}, {"factor": "设定温度", "contribution": 1.0451, "pct": 9.5}, {"factor": "热时间常数", "contribution": 1.4628, "pct": 13.3}, {"factor": "能效比", "contribution": 1.3433, "pct": 12.2}], "kpi": {"avg_critical_hours": 3.81, "max_savings_pct": 52.78, "best_case": "外出14h, 室外38°C, tau=2h, COP=4.0, 节能52.8%", "worst_case": "外出11h, 室外26°C, tau=12h, COP=3.3, 多耗16.6%"}};

// ── Plotly 全局布局 ───────────────────────────────────────
const DARK_LAYOUT = {
  paper_bgcolor: "rgba(0,0,0,0)",
  plot_bgcolor: "rgba(0,0,0,0)",
  font: { family: "system-ui, -apple-system, 'Microsoft YaHei', sans-serif", color: "#e5e7eb", size: 12 },
  margin: { t: 10, r: 20, b: 50, l: 55 },
  xaxis: { gridcolor: "#1e3a5f", zerolinecolor: "#1e3a5f", tickfont: { size: 11 } },
  yaxis: { gridcolor: "#1e3a5f", zerolinecolor: "#1e3a5f", tickfont: { size: 11 } },
  legend: { bgcolor: "rgba(0,0,0,0)", font: { size: 11, color: "#e5e7eb" } },
  hoverlabel: { bgcolor: "#162544", font: { color: "#e5e7eb", size: 12 } },
};
const CONFIG = { responsive: true, displayModeBar: true, modeBarButtonsToRemove: ["lasso2d", "select2d"], displaylogo: false };

// ── 初始化温度筛选下拉 ───────────────────────────────────
const selTout = document.getElementById("filterTout");
DATA.scatter.T_out_unique.forEach(t => {
  const opt = document.createElement("option");
  opt.value = t;
  opt.textContent = t + "°C";
  selTout.appendChild(opt);
});

// ── 图表1: 两方案耗电量对比散点图 ────────────────────────
function renderChart1(filterTout) {
  const sd = DATA.scatter;
  const idx = [];
  for (let i = 0; i < sd.t_off.length; i++) {
    if (filterTout === "all" || sd.T_out[i] === filterTout) idx.push(i);
  }

  const traceA = {
    x: idx.map(i => sd.t_off[i]),
    y: idx.map(i => sd.E_A[i]),
    mode: "markers+lines",
    type: "scatter",
    name: "方案A（恒温常开）",
    marker: { color: "#42A5F5", size: 8, line: { color: "#1e88e5", width: 1 } },
    line: { color: "#42A5F5", width: 1, dash: "dot" },
    customdata: idx.map(i => [sd.T_out[i], sd.savings_pct[i], sd.winner[i]]),
    hovertemplate:
      "<b>方案A 恒温常开</b><br>" +
      "外出时长: %{x} h<br>" +
      "日均耗电: %{y:.4f} kWh<br>" +
      "室外温度: %{customdata[0]}°C<br>" +
      "节能比例: %{customdata[1]:.2f}%<br>" +
      "胜出: %{customdata[2]}<extra></extra>",
  };

  const traceB = {
    x: idx.map(i => sd.t_off[i]),
    y: idx.map(i => sd.E_B[i]),
    mode: "markers+lines",
    type: "scatter",
    name: "方案B（间歇关机）",
    marker: { color: "#ef5350", size: 8, line: { color: "#c62828", width: 1 } },
    line: { color: "#ef5350", width: 1, dash: "dot" },
    customdata: idx.map(i => [sd.T_out[i], sd.savings_pct[i], sd.winner[i]]),
    hovertemplate:
      "<b>方案B 间歇关机</b><br>" +
      "外出时长: %{x} h<br>" +
      "日均耗电: %{y:.4f} kWh<br>" +
      "室外温度: %{customdata[0]}°C<br>" +
      "节能比例: %{customdata[1]:.2f}%<br>" +
      "胜出: %{customdata[2]}<extra></extra>",
  };

  const layout = JSON.parse(JSON.stringify(DARK_LAYOUT));
  layout.xaxis.title = { text: "外出时长 (h)", standoff: 10 };
  layout.yaxis.title = { text: "日均耗电量 (kWh)", standoff: 10 };
  layout.title = { text: "", font: { size: 0 } };

  Plotly.react("chart1", [traceA, traceB], layout, CONFIG);
}

selTout.addEventListener("change", () => renderChart1(selTout.value));
renderChart1("all");

// ── 图表2: 临界时长热力图 ────────────────────────────────
function renderChart2() {
  const hm = DATA.heatmap;
  if (!hm.t_critical_matrix || hm.t_critical_matrix.length === 0) {
    document.getElementById("chart2").innerHTML = "<div style='color:#9ca3af;text-align:center;padding-top:80px;'>暂无热力图数据</div>";
    return;
  }

  const trace = {
    z: hm.t_critical_matrix,
    x: hm.T_out_vals,
    y: hm.tau_vals,
    type: "heatmap",
    colorscale: [
      [0, "#1a237e"],
      [0.25, "#42A5F5"],
      [0.5, "#66bb6a"],
      [0.75, "#f59e0b"],
      [1, "#ef5350"],
    ],
    colorbar: {
      title: { text: "临界时长 (h)", font: { color: "#e5e7eb", size: 11 } },
      tickfont: { color: "#e5e7eb" },
      thickness: 14,
    },
    hovertemplate:
      "室外温度: %{x}°C<br>" +
      "热时间常数: %{y} h<br>" +
      "临界外出时长: %{z:.2f} h<extra></extra>",
    showscale: true,
  };

  const layout = JSON.parse(JSON.stringify(DARK_LAYOUT));
  layout.xaxis.title = { text: "室外温度 (°C)", standoff: 10 };
  layout.yaxis.title = { text: "建筑热时间常数 (h)", standoff: 10 };

  Plotly.react("chart2", [trace], layout, CONFIG);
}
renderChart2();

// ── 图表3: 单因子敏感性曲线 ──────────────────────────────
function renderChart3(factor) {
  const sd = DATA.sensitivity[factor];
  if (!sd) return;

  const traceSavings = {
    x: sd.levels,
    y: sd.savings_mean,
    type: "scatter",
    mode: "lines+markers",
    name: "节能比例 (%)",
    line: { color: "#66bb6a", width: 3 },
    marker: { color: "#66bb6a", size: 8 },
    yaxis: "y",
    hovertemplate:
      "<b>" + sd.label + "</b><br>" +
      "水平: %{x}<br>" +
      "平均节能: %{y:.2f}%<extra></extra>",
  };

  const traceEA = {
    x: sd.levels,
    y: sd.E_A_mean,
    type: "scatter",
    mode: "lines+markers",
    name: "方案A 耗电 (kWh)",
    line: { color: "#42A5F5", width: 2, dash: "dash" },
    marker: { color: "#42A5F5", size: 6 },
    yaxis: "y2",
    hovertemplate:
      "方案A: %{y:.4f} kWh<extra></extra>",
  };

  const traceEB = {
    x: sd.levels,
    y: sd.E_B_mean,
    type: "scatter",
    mode: "lines+markers",
    name: "方案B 耗电 (kWh)",
    line: { color: "#ef5350", width: 2, dash: "dash" },
    marker: { color: "#ef5350", size: 6 },
    yaxis: "y2",
    hovertemplate:
      "方案B: %{y:.4f} kWh<extra></extra>",
  };

  // 零线
  const traceZero = {
    x: [sd.levels[0] - 1, sd.levels[sd.levels.length - 1] + 1],
    y: [0, 0],
    type: "scatter",
    mode: "lines",
    name: "零线（临界）",
    line: { color: "#f59e0b", width: 1.5, dash: "dot" },
    yaxis: "y",
    hoverinfo: "skip",
  };

  const layout = JSON.parse(JSON.stringify(DARK_LAYOUT));
  layout.xaxis.title = { text: sd.label, standoff: 10 };
  layout.yaxis.title = { text: "节能比例 (%)", standoff: 10, color: "#66bb6a" };
  layout.yaxis2 = {
    title: { text: "耗电量 (kWh)", standoff: 10, color: "#9ca3af" },
    overlaying: "y",
    side: "right",
    gridcolor: "rgba(0,0,0,0)",
    zerolinecolor: "#1e3a5f",
    tickfont: { color: "#9ca3af", size: 10 },
    rangemode: "tozero",
  };
  layout.legend.x = 0.02;
  layout.legend.y = 0.98;

  Plotly.react("chart3", [traceSavings, traceZero, traceEA, traceEB], layout, CONFIG);
}

document.getElementById("sensitivityFactor").addEventListener("change", (e) => renderChart3(e.target.value));
renderChart3("t_off");

// ── 图表4: 方差贡献率 ────────────────────────────────────
function renderChart4(type) {
  const anova = DATA.anova;
  if (!anova || anova.length === 0) return;

  let traces;
  let layout;

  if (type === "pie") {
    traces = [{
      labels: anova.map(d => d.factor),
      values: anova.map(d => d.pct),
      type: "pie",
      hole: 0.4,
      marker: {
        colors: ["#42A5F5", "#ef5350", "#66bb6a", "#f59e0b", "#ab47bc", "#26c6da"],
        line: { color: "#0f1b33", width: 2 },
      },
      textinfo: "label+percent",
      textfont: { color: "#e5e7eb", size: 11 },
      hovertemplate: "<b>%{label}</b><br>贡献率: %{value:.1f}%<extra></extra>",
    }];
    layout = JSON.parse(JSON.stringify(DARK_LAYOUT));
    layout.showlegend = false;
    layout.margin = { t: 10, r: 10, b: 10, l: 10 };
  } else {
    traces = [{
      x: anova.map(d => d.factor),
      y: anova.map(d => d.pct),
      type: "bar",
      marker: {
        color: anova.map((_, i) => ["#42A5F5", "#ef5350", "#66bb6a", "#f59e0b", "#ab47bc", "#26c6da"][i % 6]),
        line: { color: "#0f1b33", width: 1 },
        opacity: 0.9,
      },
      text: anova.map(d => d.pct.toFixed(1) + "%"),
      textposition: "outside",
      textfont: { color: "#e5e7eb", size: 11 },
      hovertemplate: "<b>%{x}</b><br>贡献率: %{y:.1f}%<extra></extra>",
    }];
    layout = JSON.parse(JSON.stringify(DARK_LAYOUT));
    layout.xaxis.title = { text: "影响因子", standoff: 10 };
    layout.yaxis.title = { text: "方差贡献率 (%)", standoff: 10 };
    layout.yaxis.rangemode = "tozero";
  }

  Plotly.react("chart4", traces, layout, CONFIG);
}

document.getElementById("anovaType").addEventListener("change", (e) => renderChart4(e.target.value));
renderChart4("bar");

// ── KPI 卡片 ─────────────────────────────────────────────
function renderKPIs() {
  const kpi = DATA.kpi;
  document.getElementById("kpi1").textContent = kpi.avg_critical_hours + " h";
  document.getElementById("kpi2").textContent = kpi.max_savings_pct + "%";
  document.getElementById("kpi3").textContent = "节能 " + kpi.max_savings_pct + "%";
  document.getElementById("kpi3detail").textContent = kpi.best_case;
  // 最不利工况
  const worstMatch = kpi.worst_case.match(/多耗([\d.]+)%/);
  const worstPct = worstMatch ? worstMatch[1] : "0";
  document.getElementById("kpi4").textContent = "多耗 " + worstPct + "%";
  document.getElementById("kpi4detail").textContent = kpi.worst_case;
}
renderKPIs();

// ── 窗口大小变化时重绘 ───────────────────────────────────
window.addEventListener("resize", () => {
  Plotly.Plots.resize("chart1");
  Plotly.Plots.resize("chart2");
  Plotly.Plots.resize("chart3");
  Plotly.Plots.resize("chart4");
});
</script>
